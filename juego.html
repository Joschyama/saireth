<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiss Clicker Game</title>

<style>
body {
    margin: 0;
    padding: 20px;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: white;
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    text-align: center;
    max-width: 400px;
}

h1 {
    color: #764ba2;
}

.score {
    font-size: 24px;
    color: #667eea;
    margin-bottom: 30px;
}

.kiss-button {
    font-size: 80px;
    background: none;
    border: none;
    cursor: pointer;
}

.kiss-button:hover {
    transform: scale(1.1);
}

.kiss-button:active {
    transform: scale(0.95);
}

.upgrades {
    margin-top: 30px;
    text-align: left;
}

button {
    display: block;
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #764ba2;
}

button:disabled {
    background: #ccc;
}
</style>
</head>

<body>

<div class="container">
    <h1>💋 Besos Clicker</h1>
    <div class="score">Besos: <span id="kisses">0</span></div>

    <button class="kiss-button" onclick="addKiss()">😘</button>

    <div class="upgrades">
        <h3>Upgrades</h3>

        <button onclick="buyUpgrade('auto')">
            Pintar Cuadros Lv.1 (10 besos)
        </button>

        <button onclick="buyUpgrade('double')">
            Doble Poder (50 besos)
        </button>

        <button onclick="buyUpgrade('triple')">
            Triple Poder (150 besos)
        </button>
    </div>
</div>

<script>
let kisses = 0;
let power = 1;

// 🔥 Auto System
let autoKissLevel = 0;
let autoKissInterval = null;
let fallingPicturesInterval = null;

// 💰 Kosten
let autoCost = 10;
let doubleCost = 50;
let tripleCost = 150;

const priceMultiplier = 1.5;

function addKiss() {
    kisses += power;
    updateDisplay();
}

function buyUpgrade(type) {

    if (type === 'auto' && kisses >= autoCost) {
        kisses -= autoCost;
        autoKissLevel++;

        // Start auto kisses once
        if (autoKissInterval === null) {
            autoKissInterval = setInterval(() => {
                kisses += autoKissLevel;
                updateDisplay();
            }, 1000);
        }

        // Start animation once
        if (fallingPicturesInterval === null) {

            function createFallingPicture() {
                const img = document.createElement('img');
                img.src = 'WhatsApp Image 2026-04-14 at 21.02.05.jpeg';
                img.style.position = 'fixed';
                img.style.width = '50px';
                img.style.left = Math.random() * (window.innerWidth - 50) + 'px';
                img.style.top = '-60px';
                img.style.zIndex = '-1';
                img.style.animation = 'fall 5s linear forwards';
                document.body.appendChild(img);

                setTimeout(() => img.remove(), 5000);
            }

            const style = document.createElement('style');
            style.textContent = '@keyframes fall { to { top: 100vh; } }';
            document.head.appendChild(style);

            fallingPicturesInterval = setInterval(() => {
                
                // 🔥 Anzahl Bilder = Level
                for (let i = 0; i < autoKissLevel; i++) {
                    createFallingPicture();
                }

            }, 2000);
        }

        autoCost = Math.floor(autoCost * priceMultiplier);

        document.querySelectorAll("button")[1].textContent =
            "Pintar Cuadros Lv." + autoKissLevel + " (" + autoCost + " besos)";
    }

    else if (type === 'double' && kisses >= doubleCost) {
        kisses -= doubleCost;
        power = 2;

        document.querySelectorAll("button")[2].style.display = "none";
    }

    else if (type === 'triple' && kisses >= tripleCost) {
        kisses -= tripleCost;
        power = 3;

        document.querySelectorAll("button")[3].style.display = "none";

        // kleine Animation
        setInterval(() => {
            document.body.style.transform = 'scale(1.05)';
            setTimeout(() => document.body.style.transform = '', 200);
        }, 2000);
    }

    updateDisplay();
}

function updateDisplay() {
    document.getElementById('kisses').textContent = kisses;
}
</script>

</body>
</html>
