<!DOCTYPE html>
<html lang="en">
<head>

<!-- The autokiss function should update automatically -->
<!-- There should be an option to buy cute pictures that will be displayed -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiss Clicker Game</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
        }
        
        h1 {
            color: #764ba2;
            margin-bottom: 10px;
        }
        
        .score {
            font-size: 24px;
            color: #667eea;
            margin-bottom: 30px;
        }
        
        .kiss-button {
            font-size: 80px;
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.1s;
            padding: 0;
        }
        
        .kiss-button:hover {
            transform: scale(1.1);
        }
        
        .kiss-button:active {
            transform: scale(0.95);
        }
        
        .upgrades {
            margin-top: 30px;
            text-align: left;
        }
        
        .upgrade-btn1 {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
                
        .upgrade-btn2 {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .upgrade-btn3 {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .upgrade-btn1:hover, .upgrade-btn2:hover, .upgrade-btn3:hover {
            background: #764ba2;
        }
        
        .upgrade-btn1:disabled, .upgrade-btn2:disabled, .upgrade-btn3:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💋 Besos Clicker</h1>
        <div class="score">Besos: <span id="kisses">0</span></div>
        
        <button class="kiss-button" onclick="addKiss()">😘</button>
        
        <div class="upgrades">
            <h3>Upgrades</h3>
            <button class="upgrade-btn1" onclick="buyUpgrade('auto', autoCost)">
                 Pintar Cuadros (10 besos)
            </button>
            <button class="upgrade-btn2" onclick="buyUpgrade('double', doubleCost)">
                Doble Poder (50 besos)
            </button>
            <button class="upgrade-btn3" onclick="buyUpgrade('triple', tripleCost)">
                Triple Poder (150 besos)
            </button>
        </div>
    </div>

    <script>
        let kisses = 0;
        let power = 1;
        let autoKissActive = false;
        let fallingPicturesStarted = false;
        let autoCost = 10;
        let doubleCost = 50;
        let tripleCost = 150;
        const priceMultiplier = 1.5;

        function addKiss() {
            kisses += power;
            updateDisplay();
        }

        function buyUpgrade(type, cost) {
            if (kisses >= cost) {
                kisses -= cost;
                if (type === 'auto') {
                    //für jedes upgrade fallen mehrere bilder von diesem von oben runter
                    autoKissActive = true;
                    //TODO: AUTO SCALING OF PRICES
                    // Animation: Bilder fallen von oben
                    function createFallingPicture() {
                        const img = document.createElement('img');
                        img.src = 'WhatsApp Image 2026-04-14 at 21.02.05.jpeg';
                        img.style.position = 'fixed';
                        img.style.width = '50px';
                        img.style.left = Math.random() * (window.innerWidth - 50) + 'px';
                        img.style.top = '-60px';
                        img.style.zIndex = '-1';
                        img.style.animation = 'fall 5s linear forwards';
                        document.body.appendChild(img);
                        
                        setTimeout(() => img.remove(), 5000);
                    }
                    
                    // Füge CSS Animation hinzu
                    const style = document.createElement('style');
                    style.textContent = '@keyframes fall { to { top: 100vh; } }';
                    document.head.appendChild(style);
                    // Erstelle alle 2 Sekunden ein neues Bild
                    setInterval(createFallingPicture, 2000);
                    autoCost = Math.floor(autoCost * priceMultiplier);
                    document.getElementsByClassName('upgrade-btn1')[0].textContent = 'Pintar Cuadros (' + (autoCost) + ' besos)';
                    setInterval(() => kisses++, 1000);
                    setInterval(() => {
                        addKiss();
                    }, 1000);
                } else if (type === 'double') {
                    power = 2;
                    doubleCost = Math.floor(doubleCost * priceMultiplier);
                    document.getElementsByClassName('upgrade-btn2')[0].textContent = 'Doble Poder (' + (doubleCost) + ' besos)';
                } else if (type === 'triple') {
                    power = 3;
                    tripleCost = Math.floor(tripleCost * priceMultiplier);
                    document.getElementsByClassName('upgrade-btn3')[0].textContent = 'Triple Poder (' + (tripleCost) + ' besos)';
                    //TODO: Implement the code for the triple power upgrade
                    // This upgrade should add an additional animation to the background
                    // The animation should be a scaling animation that runs every 2 seconds
                    setInterval(() => {
                        document.body.style.transform = 'scale(1.05)';
                        setTimeout(() => document.body.style.transform = '', 2000);
                    }, 2000);
                }
                updateDisplay();
            }
            displayUpgrades();
            
        }
        

        function displayUpgrades() {
            const upgradesElement = document.querySelector('.upgrades');
            // Remove existing list if present
            const existingList = upgradesElement.querySelector('.upgrades-list');
            if (existingList) {
                existingList.remove();
            }
            
            const upgradesListElement = document.createElement('ul');
            upgradesListElement.className = 'upgrades-list';

            if (autoKissActive) {
                triplePowerElement.textContent = 'Triple Power';
                upgradesListElement.appendChild(triplePowerElement);
            }

            upgradesElement.appendChild(upgradesListElement);
            // Only append if there are any upgrades
            if (upgradesListElement.children.length > 0) {
                upgradesElement.appendChild(upgradesListElement);
            }
        }
        function updateDisplay() {
            document.getElementById('kisses').textContent = kisses;
        }
    </script>
</body>
</html>
