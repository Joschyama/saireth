<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Amor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        
        h1 {
            color: #764ba2;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .heart {
            color: #ff6b6b;
            font-size: 2em;
            margin: 0 5px;
        }
        
        p {
            color: #555;
            line-height: 1.6;
            margin: 20px 0;
            font-size: 1.1em;
        }
        
        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.3s;
        }
        
        .button:hover {
            transform: scale(1.05);
        }

        @keyframes fall {
            to {
                top: 100vh;
                opacity: 0;
                transform: translateX(100px) rotate(360deg);
            }
        }

        .star {
            position: fixed;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.8;
            z-index: -1;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.2; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hola, Mi Vida <span class="heart">💕</span></h1>
        <img src="./WhatsApp Image 2026-04-13 at 21.34.142.jpeg" alt="" style="border: 5px solid #764ba2; border-radius: 500px; width: 100%; max-width: 400px; margin: 20px 0;">
        <p>Eres la persona más hermosa en mi vida.</p>
        <p>Cada momento contigo es especial.</p>
        <button class="button" onclick="besos()">Haga clic para una sorpresa 🎉</button>
        <p id="besos-message" style="display:none; color:#764ba2; font-size:1.3em; margin-top:20px;">¡Besos para ti! 💖</p>
    </div>
    <script>
        function besos() {
            document.getElementById('besos-message').style.display = 'block';
            createHearts();
            updatePageStyle();
        }
        
function createHearts() {
    for (let i = 0; i < 30; i++) {
        const heart = document.createElement('div');
        heart.innerHTML = '💖';
        heart.style.position = 'fixed';
        heart.style.left = Math.random() * 100 + '%';
        heart.style.top = '-10px';
        heart.style.fontSize = Math.random() * 20 + 20 + 'px';
        heart.style.opacity = '1';
        heart.style.pointerEvents = 'none';
        heart.style.animation = 'fall ' + (Math.random() * 3 + 2) + 's linear forwards';
        document.body.appendChild(heart);
        
        setTimeout(() => heart.remove(), 5000);
    }
}
// Add stars to the background
function updatePageStyle() {
    
    const bodyElement = document.body;
    bodyElement.style.transition = 'background 1s ease-in-out';
    bodyElement.style.background = 'radial-gradient(circle at top, #1b2735 0%, #090a0f 60%, #05070b 100%)';
    bodyElement.style.color = '#f8f9fa';

    const containerElement = document.querySelector('.container');
    containerElement.style.transition = 'all 1s ease-in-out';
    containerElement.style.background = 'rgba(27, 39, 53, 0.8)';
    containerElement.style.boxShadow = '0 10px 40px rgba(0, 0, 0, 0.35)';
    containerElement.style.border = '1px solid rgba(255, 255, 255, 0.15)';

    const messageElement = document.getElementById('besos-message');
    messageElement.innerText = '¡Besos para ti bajo un cielo de estrellas! ';
    messageElement.style.transition = 'color 1s ease-in-out';
    messageElement.style.color = '#ffd7e0';

    // Add stars to the background
    const stars = [];
    for (let i = 0; i < 100; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.top = Math.random() * 100 + '%';
        star.style.left = Math.random() * 100 + '%';
        star.style.animation = 'twinkle ' + (Math.random() * 3 + 2) + 's ease-in-out infinite';
        document.body.appendChild(star);
        stars.push(star);
    }

    // Update the stars animation every 500ms
    setInterval(() => {
        stars.forEach(star => {
            star.style.animation = 'twinkle ' + (Math.random() * 3 + 2) + 's ease-in-out infinite';
        });
    }, 500);
}
    </script>
</body>
</html>
